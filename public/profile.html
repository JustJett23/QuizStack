<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://kit.fontawesome.com/ab54a7aff8.js" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <link rel="stylesheet" href="style.css">
        <title>QuizStack</title>
        <link rel="icon" type="image/x-icon" href="img.ico">
    </head>
    <body>
        <h1 class="quiz-logo">
                <img src="img.png" alt="img" class="logo-img">
                <span class="logo-text">uizStack</span>
        </h1>

        <div class="profile-section">
            <div class="containerss">
                <div class="banner">
                    <div class="profile-container">
                        <div class="camera-container" id="camera-container">
                                <video id="video" autoplay></video>
                                <canvas id="canvas"></canvas>
                        </div>
                        
                        <div class="profile">
                            <input type="text" class="profile-name" id="username" readonly> 

                            <label for="username" class="tag">Username</label>
                        </div>
                    </div>

                    <div class="return">
                        <ol>
                            <li>
                                <span class="tooltip">
                                    <a href="Dashboard.html" >
                                        <button class="icons" id="settings-button">
                                            <i class="fa-solid fa-angle-left"></i>
                                        </button>
                                    </a>
                                    <span class="tooltiptext">Return</span>
                                <span>  
                            </li>
                        </ol>
                    </div>
                </div>

                <div class="main-profile">
                    <h1 class="profile-header">History</h1>

                    <table class="quizzes" id="quizzes">
                        <thead>
                            <tr>
                                <th>Mode</th>
                                <th>Level</th>
                                <th>Score</th>
                                <th>Date and Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Quiz history rows will be appended here by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="white-curve"></div>
        <script src="script.js"></script>
    </body>
</html>
