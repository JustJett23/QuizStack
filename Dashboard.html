<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/ab54a7aff8.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>QuizStack</title>
    <link rel="icon" type="image/x-icon" href="img.ico">
</head>
<body>
    <header class="quiz-logo">
        <img src="img.png" alt="QuizStack Logo" class="logo-img">
        <span class="logo-text">QuizStack</span>
    </header>

    <main class="play">
        <ol>
            <li>
                <span class="tooltip">
                    <a href="quiz.html">
                        <button class="icons" id="play-button">
                            <i class="fa-solid fa-play"></i>
                        </button>
                    </a>
                    <span class="tooltiptext">Play</span>
                </span>
            </li>
        </ol>
    </main>

    <footer class="footer">
        <ol>
            <li>
                <span class="tooltip">
                    <a href="index.html">
                        <button class="icons" id="logout-button">
                            <i class="fa-solid fa-right-to-bracket"></i>
                        </button>
                    </a>
                    <span class="tooltiptext">Logout</span>
                </span>
            </li>
            <li>
                <span class="tooltip">
                    <a href="settings.html">
                        <button class="icons" id="settings">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </a>
                    <span class="tooltiptext">Settings</span>
                </span>
            </li>
            <li>
                <span class="tooltip">
                    <a href="profile.html">
                        <button class="icons" id="profile">
                            <i class="fa-solid fa-user"></i>
                        </button>
                    </a>
                    <span class="tooltiptext">Profile</span>
                </span>
            </li>
        </ol>
    </footer>

    <div class="white-curve"></div>
    <script src="script.js"></script>
</body>
</html>
